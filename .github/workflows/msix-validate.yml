name: Validate MSIX Package

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

jobs:
  validate-msix:
    name: Build MSIX (Windows SDK)
    runs-on: windows-latest

    steps:
      - name: Set UTF-8 encoding
        run: chcp 65001
        shell: cmd
        
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build and package MSIX
        run: |
          python buildandcopy.py --release

      - name: Check MSIX output
        run: |
          if not exist "../logi-battery-tray.msix" (
            echo "❌ MSIX file not found!"
            exit 1
          )
