name: Validate MSIX Package

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write

jobs:
  validate-msix:
    name: Build MSIX (Windows SDK)
    runs-on: windows-latest

    steps:
      - name: Set UTF-8 encoding
        run: chcp 65001
        shell: cmd
        
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build and package MSIX
        run: |
          python buildandcopy.py --release

      - name: Check MSIX file exists
        shell: bash
        run: |
          if [ ! -f "../logi-battery-tray.msix" ]; then
            echo "MSIX file not found!"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: success() && github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: ../logi-battery-tray.msix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

