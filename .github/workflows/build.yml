name: Build and Lint

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write  # Needed for release creation

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller flake8

      - name: Lint with flake8
        run: flake8 . --exclude=dist,build,.venv --max-line-length=120

      - name: Build executable
        run: pyinstaller --noconsole --onefile --name logi-battery-tray main.py

      - name: Calculate SHA256
        run: |
          echo "SHA256 checksum for dist/logi-battery-tray.exe:"
          sha256sum dist/logi-battery-tray.exe || shasum -a 256 dist/logi-battery-tray.exe

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: logi-battery-tray
          path: dist/logi-battery-tray.exe

      - name: Read version from version.txt
        id: get_version
        run: echo "VERSION=$(cat version.txt | tr -d '\n')" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: success() && github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: dist/logi-battery-tray.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
